<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Регистрация — Образовательный центр</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.min.css">
    <style>
        :root {
            --bg-body: #f7f5f2; --bg-card: #ffffff; --bg-dark: #2c2c2c;
            --text-primary: #2c2c2c; --text-secondary: #7a7a7a;
            --accent: #a68a64; --accent-hover: #8f7653;
            --primary: #5c6b73; --primary-hover: #4a575e;
            --border: #e5e2dc; --success: #6b8f71; --danger: #b05a5a;
            --radius: 10px; --radius-lg: 16px; --shadow: 0 2px 16px rgba(0,0,0,0.06);
        }
        body {
            background: var(--bg-body);
            color: var(--text-primary);
            font-family: 'Segoe UI', system-ui, sans-serif;
            min-height: 100vh;
            display: flex; flex-direction: column;
        }
        .top-bar {
            background: var(--bg-card);
            border-bottom: 1px solid var(--border);
            padding: 0.75rem 0;
        }
        .top-bar a {
            color: var(--text-secondary);
            text-decoration: none;
            font-weight: 600;
            font-size: 0.9rem;
            transition: color 0.2s;
        }
        .top-bar a:hover { color: var(--accent); }
        .auth-wrapper {
            flex: 1;
            display: flex; align-items: center; justify-content: center;
            padding: 2rem 1rem;
        }
        .auth-card {
            background: var(--bg-card);
            border-radius: var(--radius-lg);
            box-shadow: var(--shadow);
            border: 1px solid var(--border);
            width: 100%;
            max-width: 540px;
        }
        .auth-card-header {
            padding: 2rem 2rem 0;
            text-align: center;
        }
        .auth-card-header .brand-icon {
            width: 56px; height: 56px;
            border-radius: 16px;
            background: rgba(166,138,100,0.12);
            color: var(--accent);
            display: inline-flex; align-items: center; justify-content: center;
            font-size: 1.5rem;
            margin-bottom: 1rem;
        }
        .auth-card-header h4 { font-weight: 800; margin-bottom: 0.25rem; }
        .auth-card-header p { color: var(--text-secondary); font-size: 0.95rem; margin: 0; }
        .auth-card-body { padding: 1.75rem 2rem 2rem; }
        .form-label { font-weight: 600; font-size: 0.875rem; color: var(--text-primary); }
        .form-label .required { color: var(--danger); }
        .form-control, .form-select {
            border: 1px solid var(--border);
            border-radius: 8px;
            padding: 10px 14px;
            font-size: 0.95rem;
            transition: border-color 0.2s, box-shadow 0.2s;
        }
        .form-control:focus, .form-select:focus {
            border-color: var(--accent);
            box-shadow: 0 0 0 3px rgba(166,138,100,0.15);
        }
        .form-control.is-invalid { border-color: var(--danger); }
        .form-control.is-invalid:focus { box-shadow: 0 0 0 3px rgba(176,90,90,0.15); }
        .form-control.is-valid { border-color: var(--success); }
        .form-control.is-valid:focus { box-shadow: 0 0 0 3px rgba(107,143,113,0.15); }
        .invalid-feedback { font-size: 0.8rem; }
        .valid-feedback { font-size: 0.8rem; }
        .btn-accent {
            background: var(--accent); color: #fff; border: none;
            border-radius: 8px; font-weight: 700; padding: 11px 24px;
            transition: all 0.2s; width: 100%;
        }
        .btn-accent:hover { background: var(--accent-hover); color: #fff; transform: translateY(-1px); box-shadow: var(--shadow); }
        .btn-accent:disabled { opacity: 0.6; transform: none; }
        .auth-footer {
            text-align: center; padding: 0 2rem 1.75rem;
            color: var(--text-secondary); font-size: 0.9rem;
        }
        .auth-footer a { color: var(--accent); font-weight: 600; text-decoration: none; }
        .auth-footer a:hover { text-decoration: underline; }
        .input-group-text {
            background: var(--bg-body); border: 1px solid var(--border);
            color: var(--text-secondary); border-radius: 8px 0 0 8px;
        }
        .input-group .form-control { border-radius: 0 8px 8px 0; }
    </style>
</head>
<body>

    <div class="top-bar">
        <div class="container d-flex justify-content-between align-items-center">
            <a href="index.html"><i class="bi bi-arrow-left me-1"></i> На главную</a>
            <a href="authorization.html">Войти <i class="bi bi-box-arrow-in-right ms-1"></i></a>
        </div>
    </div>

    <div class="auth-wrapper">
        <div class="auth-card">
            <div class="auth-card-header">
                <div class="brand-icon"><i class="bi bi-person-plus-fill"></i></div>
                <h4>Регистрация</h4>
                <p>Создайте аккаунт для подачи заявок</p>
            </div>
            <div class="auth-card-body">
                <div id="successMsg" class="alert d-none" role="alert" style="background:rgba(107,143,113,0.1);color:var(--success);border:1px solid rgba(107,143,113,0.2);border-radius:8px;">
                    <i class="bi bi-check-circle-fill me-1"></i> Регистрация прошла успешно! Перенаправление...
                </div>
                <form id="regForm" novalidate>
                    <!-- Логин -->
                    <div class="mb-3">
                        <label for="regLogin" class="form-label">Логин <span class="required">*</span></label>
                        <div class="input-group">
                            <span class="input-group-text"><i class="bi bi-person"></i></span>
                            <input type="text" class="form-control" id="regLogin" placeholder="Латиница и цифры, от 6 символов" required>
                        </div>
                        <div class="invalid-feedback" id="loginError"></div>
                        <div class="valid-feedback">Логин доступен</div>
                    </div>
                    <!-- Пароль -->
                    <div class="mb-3">
                        <label for="regPassword" class="form-label">Пароль <span class="required">*</span></label>
                        <div class="input-group">
                            <span class="input-group-text"><i class="bi bi-lock"></i></span>
                            <input type="password" class="form-control" id="regPassword" placeholder="Минимум 8 символов" required>
                            <button class="btn btn-outline-secondary border-start-0" type="button" id="togglePass" style="border-radius:0 8px 8px 0">
                                <i class="bi bi-eye"></i>
                            </button>
                        </div>
                        <div class="invalid-feedback" id="passError"></div>
                    </div>
                    <!-- ФИО -->
                    <div class="mb-3">
                        <label for="regFio" class="form-label">ФИО <span class="required">*</span></label>
                        <div class="input-group">
                            <span class="input-group-text"><i class="bi bi-person-vcard"></i></span>
                            <input type="text" class="form-control" id="regFio" placeholder="Иванов Иван Иванович" required>
                        </div>
                        <div class="invalid-feedback" id="fioError"></div>
                    </div>
                    <!-- Телефон -->
                    <div class="mb-3">
                        <label for="regPhone" class="form-label">Телефон <span class="required">*</span></label>
                        <div class="input-group">
                            <span class="input-group-text"><i class="bi bi-telephone"></i></span>
                            <input type="tel" class="form-control" id="regPhone" placeholder="8(XXX)XXX-XX-XX" maxlength="15" required>
                        </div>
                        <div class="invalid-feedback" id="phoneError"></div>
                    </div>
                    <!-- Email -->
                    <div class="mb-4">
                        <label for="regEmail" class="form-label">Электронная почта <span class="required">*</span></label>
                        <div class="input-group">
                            <span class="input-group-text"><i class="bi bi-envelope"></i></span>
                            <input type="email" class="form-control" id="regEmail" placeholder="example@mail.ru" required>
                        </div>
                        <div class="invalid-feedback" id="emailError"></div>
                    </div>
                    <button type="submit" class="btn btn-accent" id="submitBtn">
                        Зарегистрироваться
                    </button>
                </form>
            </div>
            <div class="auth-footer">
                Уже зарегистрированы? <a href="authorization.html">Войти</a>
            </div>
        </div>
    </div>

    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
    <script>
        // Маска телефона: 8(XXX)XXX-XX-XX
        const phoneInput = document.getElementById('regPhone');
        phoneInput.addEventListener('input', function(e) {
            let val = this.value.replace(/\D/g, '');
            if (val.length > 0 && val[0] !== '8') val = '8' + val.slice(1);
            if (val.length > 11) val = val.slice(0, 11);
            let formatted = '';
            if (val.length > 0) formatted += val[0];
            if (val.length > 1) formatted += '(' + val.slice(1, 4);
            if (val.length > 4) formatted += ')' + val.slice(4, 7);
            if (val.length > 7) formatted += '-' + val.slice(7, 9);
            if (val.length > 9) formatted += '-' + val.slice(9, 11);
            this.value = formatted;
        });

        // Показать/скрыть пароль
        document.getElementById('togglePass').addEventListener('click', function() {
            const p = document.getElementById('regPassword');
            const i = this.querySelector('i');
            if (p.type === 'password') { p.type = 'text'; i.classList.replace('bi-eye','bi-eye-slash'); }
            else { p.type = 'password'; i.classList.replace('bi-eye-slash','bi-eye'); }
        });

        // Проверка логина в реальном времени
        document.getElementById('regLogin').addEventListener('input', function() {
            const v = this.value;
            const regex = /^[a-zA-Z0-9]+$/;
            if (v.length > 0 && !regex.test(v)) {
                this.setCustomValidity('Допустимы только латиница и цифры');
            } else if (v.length >= 6) {
                this.setCustomValidity('');
                this.classList.remove('is-invalid');
                this.classList.add('is-valid');
            } else {
                this.setCustomValidity('');
                this.classList.remove('is-valid','is-invalid');
            }
        });

        // Валидация формы
        document.getElementById('regForm').addEventListener('submit', function(e) {
            e.preventDefault();
            let valid = true;

            // Логин: латиница + цифры, мин 6
            const login = document.getElementById('regLogin');
            const loginErr = document.getElementById('loginError');
            const loginRegex = /^[a-zA-Z0-9]{6,}$/;
            login.classList.remove('is-valid','is-invalid');
            if (!login.value.trim()) {
                loginErr.textContent = 'Введите логин'; login.classList.add('is-invalid'); valid = false;
            } else if (!loginRegex.test(login.value.trim())) {
                loginErr.textContent = 'Латиница и цифры, не менее 6 символов'; login.classList.add('is-invalid'); valid = false;
            } else {
                login.classList.add('is-valid');
            }

            // Пароль: мин 8
            const pass = document.getElementById('regPassword');
            const passErr = document.getElementById('passError');
            pass.classList.remove('is-valid','is-invalid');
            if (!pass.value) {
                passErr.textContent = 'Введите пароль'; pass.classList.add('is-invalid'); valid = false;
            } else if (pass.value.length < 8) {
                passErr.textContent = 'Минимум 8 символов'; pass.classList.add('is-invalid'); valid = false;
            } else {
                pass.classList.add('is-valid');
            }

            // ФИО: кириллица + пробелы
            const fio = document.getElementById('regFio');
            const fioErr = document.getElementById('fioError');
            const fioRegex = /^[А-ЯЁа-яё\s-]+$/;
            fio.classList.remove('is-valid','is-invalid');
            if (!fio.value.trim()) {
                fioErr.textContent = 'Введите ФИО'; fio.classList.add('is-invalid'); valid = false;
            } else if (!fioRegex.test(fio.value.trim())) {
                fioErr.textContent = 'Допустимы только кириллица и пробелы'; fio.classList.add('is-invalid'); valid = false;
            } else {
                fio.classList.add('is-valid');
            }

            // Телефон: 8(XXX)XXX-XX-XX
            const phone = document.getElementById('regPhone');
            const phoneErr = document.getElementById('phoneError');
            const phoneRegex = /^8\(\d{3}\)\d{3}-\d{2}-\d{2}$/;
            phone.classList.remove('is-valid','is-invalid');
            if (!phone.value.trim()) {
                phoneErr.textContent = 'Введите номер телефона'; phone.classList.add('is-invalid'); valid = false;
            } else if (!phoneRegex.test(phone.value)) {
                phoneErr.textContent = 'Формат: 8(XXX)XXX-XX-XX'; phone.classList.add('is-invalid'); valid = false;
            } else {
                phone.classList.add('is-valid');
            }

            // Email
            const email = document.getElementById('regEmail');
            const emailErr = document.getElementById('emailError');
            const emailRegex = /^[^\s@]+@[^\s@]+\.[^\s@]+$/;
            email.classList.remove('is-valid','is-invalid');
            if (!email.value.trim()) {
                emailErr.textContent = 'Введите электронную почту'; email.classList.add('is-invalid'); valid = false;
            } else if (!emailRegex.test(email.value.trim())) {
                emailErr.textContent = 'Некорректный формат электронной почты'; email.classList.add('is-invalid'); valid = false;
            } else {
                email.classList.add('is-valid');
            }

            if (!valid) return;

            // Успешная регистрация
            const btn = document.getElementById('submitBtn');
            btn.disabled = true;
            btn.innerHTML = '<span class="spinner-border spinner-border-sm me-2"></span>Регистрация...';

            setTimeout(() => {
                document.getElementById('successMsg').classList.remove('d-none');
                btn.classList.add('d-none');
                setTimeout(() => { window.location.href = 'authorization.html'; }, 1500);
            }, 1000);
        });
    </script>
</body>
</html>
