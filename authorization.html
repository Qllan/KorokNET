<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Авторизация — Образовательный центр</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.min.css">
    <style>
        :root {
            --bg-body: #f7f5f2; --bg-card: #ffffff; --bg-dark: #2c2c2c;
            --text-primary: #2c2c2c; --text-secondary: #7a7a7a;
            --accent: #a68a64; --accent-hover: #8f7653;
            --primary: #5c6b73; --primary-hover: #4a575e;
            --border: #e5e2dc; --success: #6b8f71; --danger: #b05a5a;
            --radius: 10px; --radius-lg: 16px; --shadow: 0 2px 16px rgba(0,0,0,0.06);
        }
        body {
            background: var(--bg-body); color: var(--text-primary);
            font-family: 'Segoe UI', system-ui, sans-serif;
            min-height: 100vh; display: flex; flex-direction: column;
        }
        .top-bar {
            background: var(--bg-card); border-bottom: 1px solid var(--border); padding: 0.75rem 0;
        }
        .top-bar a { color: var(--text-secondary); text-decoration: none; font-weight: 600; font-size: 0.9rem; transition: color 0.2s; }
        .top-bar a:hover { color: var(--accent); }
        .auth-wrapper { flex:1; display:flex; align-items:center; justify-content:center; padding:2rem 1rem; }
        .auth-card {
            background: var(--bg-card); border-radius: var(--radius-lg);
            box-shadow: var(--shadow); border: 1px solid var(--border);
            width: 100%; max-width: 440px;
        }
        .auth-card-header { padding: 2.5rem 2rem 0; text-align: center; }
        .auth-card-header .brand-icon {
            width: 56px; height: 56px; border-radius: 16px;
            background: rgba(166,138,100,0.12); color: var(--accent);
            display: inline-flex; align-items: center; justify-content: center;
            font-size: 1.5rem; margin-bottom: 1rem;
        }
        .auth-card-header h4 { font-weight: 800; margin-bottom: 0.25rem; }
        .auth-card-header p { color: var(--text-secondary); font-size: 0.95rem; margin: 0; }
        .auth-card-body { padding: 1.75rem 2rem 2rem; }
        .form-label { font-weight: 600; font-size: 0.875rem; }
        .form-control {
            border: 1px solid var(--border); border-radius: 8px;
            padding: 10px 14px; font-size: 0.95rem; transition: border-color 0.2s, box-shadow 0.2s;
        }
        .form-control:focus { border-color: var(--accent); box-shadow: 0 0 0 3px rgba(166,138,100,0.15); }
        .form-control.is-invalid { border-color: var(--danger); }
        .form-control.is-invalid:focus { box-shadow: 0 0 0 3px rgba(176,90,90,0.15); }
        .invalid-feedback { font-size: 0.8rem; }
        .btn-accent {
            background: var(--accent); color: #fff; border: none;
            border-radius: 8px; font-weight: 700; padding: 11px 24px;
            transition: all 0.2s; width: 100%;
        }
        .btn-accent:hover { background: var(--accent-hover); color: #fff; transform: translateY(-1px); box-shadow: var(--shadow); }
        .btn-accent:disabled { opacity: 0.6; transform: none; }
        .auth-footer { text-align:center; padding:0 2rem 1.75rem; color:var(--text-secondary); font-size:0.9rem; }
        .auth-footer a { color: var(--accent); font-weight: 600; text-decoration: none; }
        .auth-footer a:hover { text-decoration: underline; }
        .input-group-text {
            background: var(--bg-body); border: 1px solid var(--border);
            color: var(--text-secondary); border-radius: 8px 0 0 8px;
        }
        .input-group .form-control { border-radius: 0 8px 8px 0; }
        .error-box {
            background: rgba(176,90,90,0.08); color: var(--danger);
            border: 1px solid rgba(176,90,90,0.2); border-radius: 8px;
            padding: 0.75rem 1rem; font-size: 0.875rem; margin-bottom: 1rem;
            display: none;
        }
        .error-box.show { display: flex; align-items: center; }
    </style>
</head>
<body>

    <div class="top-bar">
        <div class="container d-flex justify-content-between align-items-center">
            <a href="index.html"><i class="bi bi-arrow-left me-1"></i> На главную</a>
            <a href="registration.html">Регистрация <i class="bi bi-person-plus ms-1"></i></a>
        </div>
    </div>

    <div class="auth-wrapper">
        <div class="auth-card">
            <div class="auth-card-header">
                <div class="brand-icon"><i class="bi bi-box-arrow-in-right"></i></div>
                <h4>Вход в систему</h4>
                <p>Введите логин и пароль</p>
            </div>
            <div class="auth-card-body">
                <div class="error-box" id="errorBox">
                    <i class="bi bi-exclamation-circle-fill me-2"></i>
                    <span id="errorText"></span>
                </div>
                <form id="authForm" novalidate>
                    <div class="mb-3">
                        <label for="authLogin" class="form-label">Логин</label>
                        <div class="input-group">
                            <span class="input-group-text"><i class="bi bi-person"></i></span>
                            <input type="text" class="form-control" id="authLogin" placeholder="Введите логин" required>
                        </div>
                        <div class="invalid-feedback">Введите логин</div>
                    </div>
                    <div class="mb-4">
                        <label for="authPassword" class="form-label">Пароль</label>
                        <div class="input-group">
                            <span class="input-group-text"><i class="bi bi-lock"></i></span>
                            <input type="password" class="form-control" id="authPassword" placeholder="Введите пароль" required>
                            <button class="btn btn-outline-secondary border-start-0" type="button" id="togglePass" style="border-radius:0 8px 8px 0">
                                <i class="bi bi-eye"></i>
                            </button>
                        </div>
                        <div class="invalid-feedback">Введите пароль</div>
                    </div>
                    <button type="submit" class="btn btn-accent" id="loginBtn">Войти</button>
                </form>
            </div>
            <div class="auth-footer">
                Еще не зарегистрированы? <a href="registration.html">Регистрация</a>
            </div>
        </div>
    </div>

    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
    <script>
        // База пользователей
        const users = {
            'user123': { password: '123456', role: 'user', name: 'Иванов Иван Иванович' },
            'admin':   { password: 'admin123', role: 'admin', name: 'Администратор' }
        };

        document.getElementById('togglePass').addEventListener('click', function() {
            const p = document.getElementById('authPassword');
            const i = this.querySelector('i');
            if (p.type === 'password') { p.type = 'text'; i.classList.replace('bi-eye','bi-eye-slash'); }
            else { p.type = 'password'; i.classList.replace('bi-eye-slash','bi-eye'); }
        });

        // Скрывать ошибку при вводе
        document.getElementById('authLogin').addEventListener('input', hideError);
        document.getElementById('authPassword').addEventListener('input', hideError);
        function hideError() {
            document.getElementById('errorBox').classList.remove('show');
            document.getElementById('authLogin').classList.remove('is-invalid');
            document.getElementById('authPassword').classList.remove('is-invalid');
        }

        document.getElementById('authForm').addEventListener('submit', function(e) {
            e.preventDefault();
            const errorBox = document.getElementById('errorBox');
            const errorText = document.getElementById('errorText');
            errorBox.classList.remove('show');

            const login = document.getElementById('authLogin').value.trim();
            const password = document.getElementById('authPassword').value;

            if (!login || !password) {
                if (!login) document.getElementById('authLogin').classList.add('is-invalid');
                if (!password) document.getElementById('authPassword').classList.add('is-invalid');
                errorText.textContent = 'Заполните все поля';
                errorBox.classList.add('show');
                return;
            }

            if (!users[login]) {
                errorText.textContent = 'Пользователь с таким логином не найден';
                errorBox.classList.add('show');
                document.getElementById('authLogin').classList.add('is-invalid');
                return;
            }

            if (users[login].password !== password) {
                errorText.textContent = 'Неверный пароль';
                errorBox.classList.add('show');
                document.getElementById('authPassword').classList.add('is-invalid');
                return;
            }

            // Успешный вход
            const btn = document.getElementById('loginBtn');
            btn.disabled = true;
            btn.innerHTML = '<span class="spinner-border spinner-border-sm me-2"></span>Вход...';

            sessionStorage.setItem('currentUser', JSON.stringify({
                login: login,
                role: users[login].role,
                name: users[login].name
            }));

            setTimeout(() => {
                if (users[login].role === 'admin') {
                    window.location.href = 'admin-requests.html';
                } else {
                    window.location.href = 'user-requests.html';
                }
            }, 800);
        });
    </script>
</body>
</html>
